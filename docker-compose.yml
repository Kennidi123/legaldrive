version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: legaldrive_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: legaldrive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legaldrive_app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/legaldrive
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_WHATSAPP_CHANNEL: https://whatsapp.com/channel/XXXXXXX
      NEXT_PUBLIC_YOUTUBE_CHANNEL: https://youtube.com/@legaldrive
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && npx tsx prisma/seed.ts && node server.js"

volumes:
  postgres_data:
